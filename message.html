<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "stylesheet" href="messageStyle.css">
    <title>Message Submission</title>
    
</head>
<body>
    <div class="message-container">
        <div class="page-header">
            <h2>Send a Message</h2>
            <p>Use the form below to submit your message</p>
        </div>
        
        <div class="user-info">
            <div class="avatar">A</div>
            <div class="username">admin</div>
        </div>
        
        <form id="message-form">
            <div class="form-group">
                <label for="message">Your Message</label>
                <textarea id="message" name="message" placeholder="Type your message here..." required></textarea>
                <div class="error" id="message-error">Please enter a message</div>
                <div class="char-counter"><span id="char-count">0</span> / 500 characters</div>
            </div>
            
            <div class="button-container">
                <button type="button" class="cancel-button" id="cancel-button">Cancel</button>
                <button type="submit" class="submit-button" id="submit-button">Submit Message</button>
            </div>
            
            <div id="status-message" class="status-message"></div>
        </form>
    </div>

</body>
</html>
